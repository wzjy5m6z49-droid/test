<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEST</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
      color:white;
      font-family:sans-serif;
    }

    .box{
      padding:40px 60px;
      border-radius:20px;
      background:linear-gradient(135deg,#2563eb,#06b6d4);
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
      font-size:48px;
      font-weight:bold;
      animation:fadeUp 1s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="box">
    SPO EMBED TEST 🚀
  </div>
</body>
</html>
